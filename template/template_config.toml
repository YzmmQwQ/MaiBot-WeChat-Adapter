# MaiBot 微信个人号适配器配置文件

[debug]
# 日志等级: TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"

[maibot_server]
# 是否启用 API-Server 模式 (推荐)
enable_api_server = true
# MaiBot WebSocket 服务器地址
base_url = "ws://127.0.0.1:8080/ws"
# API 密钥 (与 MaiBot 配置一致)
api_key = ""
# 平台名称标识
platform_name = "wechat"

# Legacy 模式配置 (备用)
host = "127.0.0.1"
port = 8099

[wechat]
# 微信 iLink Bot API 地址 (一般无需修改)
base_url = "https://ilinkai.weixin.qq.com"
cdn_base_url = "https://novac2c.cdn.weixin.qq.com/c2c"
# 扫码参数 (一般无需修改)
bot_type = "3"

# 登录后的 token (扫码登录成功后自动写入，也可手动填写)
token = ""
# 账户 ID (登录后自动写入)
account_id = ""

# 二维码状态轮询间隔 (秒)
qr_poll_interval = 1
# 消息拉取长轮询超时 (毫秒)
long_poll_timeout_ms = 35000
# API 请求超时 (毫秒)
api_timeout_ms = 15000

[chat]
# 私聊名单类型: none (不限制), whitelist (白名单), blacklist (黑名单)
private_list_type = "none"
# 私聊白名单/黑名单 (填写用户微信 ID)
private_list = []
# 全局黑名单用户
ban_user_id = []
